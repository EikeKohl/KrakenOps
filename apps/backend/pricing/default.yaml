# Default model pricing for KrakenOps cost computation.
#
# Schema: each entry is { model, input_per_1k_usd, output_per_1k_usd, source }.
# Override locally by creating ~/.krakenops/pricing.yaml with the same shape;
# user entries replace the matching `model` key from this default file.
#
# Prices are illustrative starter values. Verify against the official pricing
# pages and override locally if they drift:
#   https://openai.com/api/pricing
#   https://www.anthropic.com/pricing#api
#
# `source` = audit trail; bump when you re-verify.

