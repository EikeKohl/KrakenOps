[project]
name = "tentacle"
version = "0.1.0"
description = "Agent-agnostic OpenTelemetry decorators for KrakenOps. Bring your own code."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "KrakenOps contributors" }]
keywords = ["opentelemetry", "observability", "ai", "agents", "krakenops"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
    "opentelemetry-exporter-otlp-proto-http>=1.25.0",
]

[project.optional-dependencies]
openai = ["opentelemetry-instrumentation-openai-v2>=2.0b0"]
anthropic = ["opentelemetry-instrumentation-anthropic>=0.1.0"]
all = ["tentacle[openai,anthropic]"]

[project.urls]
Homepage = "https://github.com/eikekohlmeyer/KrakenOps"
Repository = "https://github.com/eikekohlmeyer/KrakenOps"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tentacle"]

[tool.hatch.version]
path = "src/tentacle/_version.py"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
