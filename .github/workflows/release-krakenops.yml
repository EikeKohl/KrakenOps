name: Release krakenops to PyPI

# Triggered by pushing a tag that matches `krakenops-v*` (e.g. krakenops-v1.0.0,
# krakenops-v1.0.0rc1). The build job extracts the bare version from the tag
# and classifies it as stable or pre-release. Pre-release tags only land on
# TestPyPI; stable tags also publish to real PyPI.
#
# Trusted publishing (OIDC) is used — no API tokens stored. The PyPI side
# requires a one-time setup (see docs/RELEASING.md).

on:
  push:
    tags:
      - "krakenops-v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.classify.outputs.version }}
      is_stable: ${{ steps.classify.outputs.is_stable }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "packages/tentacle/uv.lock"

      - name: Classify the tag (version + stable/pre-release)
        id: classify
        working-directory: packages/tentacle
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/krakenops-v}"
          file_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag version : $version"
          echo "file version: $file_version"
          if [ "$version" != "$file_version" ]; then
            echo "::error::tag version ($version) and pyproject.toml version ($file_version) disagree"
            exit 1
          fi
          # Stable iff the version is purely "N.N.N" — anything else (rcN, aN,
          # bN, .devN, .postN) is a pre-release in PEP 440 terms.
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_stable=true
          else
            is_stable=false
          fi
          echo "is_stable: $is_stable"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_stable=$is_stable" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: packages/tentacle
        run: uv build

      - name: Upload built dists
        uses: actions/upload-artifact@v4
        with:
          name: krakenops-dist
          path: packages/tentacle/dist/

  testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/krakenops
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: krakenops-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI
    needs: [build, testpypi]
    if: ${{ needs.build.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/krakenops
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: krakenops-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
