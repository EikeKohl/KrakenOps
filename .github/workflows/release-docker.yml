name: Build + push Docker images to GHCR

# Triggered on the same `krakenops-v*` tags as the PyPI release workflow,
# so a single tag push results in: PyPI wheel + sdist, GHCR backend image,
# GHCR dashboard image — all stamped with the same version.
#
# The first run will publish brand-new packages under the user's GHCR
# namespace (`ghcr.io/<owner-lowercased>/krakenops-{backend,dashboard}`).
# Make those packages public via:
#   https://github.com/users/<owner>/packages/container/<name>/settings
# (Default visibility for newly-created packages is private.)

on:
  push:
    tags:
      - "krakenops-v*"
  # Manual rebuild without a new tag (re-tags the existing version against
  # whatever is on the workflow's ref). Useful for hotfixing image-only bugs.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build + push (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: krakenops-backend
            context: ./apps/backend
          - name: krakenops-dashboard
            context: ./apps/dashboard

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=match,pattern=krakenops-v(.+),group=1
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
