name: CI

on:
  pull_request:
  push:
    branches: [main]

# A new commit cancels in-flight runs of this workflow on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk:
    name: SDK · pytest + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tentacle
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "packages/tentacle/uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  backend:
    name: Backend · pytest + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  dashboard:
    name: Dashboard · typecheck + biome + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Biome
        run: pnpm biome:check

      - name: Build
        run: pnpm build
